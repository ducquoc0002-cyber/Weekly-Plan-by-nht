<script>
// ── Tiny test framework ──────────────────────────────────────────────────
const results = [];

function assert(condition, message) {
  if (!condition) throw new Error('ASSERTION FAILED: ' + message);
}

async function runTest(suiteName, testName, fn) {
  const entry = { suite: suiteName, name: testName, status: 'pending', detail: '' };
  results.push(entry);
  try {
    await fn();
    entry.status = 'pass';
    entry.detail = 'Test passed (unexpected on unfixed code — bug may already be fixed here)';
  } catch (err) {
    entry.status = 'fail';
    entry.detail = err.message;
  }
}

function render() {
  const container = document.getElementById('results');
  container.innerHTML = '';
  const suites = {};
  results.forEach(r => { if (!suites[r.suite]) suites[r.suite] = []; suites[r.suite].push(r); });
  Object.entries(suites).forEach(([suite, tests]) => {
    const suiteEl = document.createElement('div');
    suiteEl.className = 'suite';
    suiteEl.innerHTML = `<div class="suite-title">${suite}</div>`;
    tests.forEach(t => {
      const icon = t.status === 'fail' ? '✗' : t.status === 'pass' ? '✓' : '…';
      const div = document.createElement('div');
      div.className = `test ${t.status}`;
      div.innerHTML = `<span class="label">${icon} ${t.name}</span><div class="detail">${t.detail}</div>`;
      suiteEl.appendChild(div);
    });
    container.appendChild(suiteEl);
  });
  const total  = results.length;
  const failed = results.filter(r => r.status === 'fail').length;
  const passed = results.filter(r => r.status === 'pass').length;
  const summaryEl = document.getElementById('summary');
  const allFailed = failed === total;
  summaryEl.className = 'summary ' + (allFailed ? 'all-fail' : 'some-pass');
  summaryEl.innerHTML = `
    Results: ${failed}/${total} tests FAILED (expected on unfixed code)<br>
    ${passed > 0
      ? `⚠️  ${passed} test(s) passed unexpectedly — those bugs may already be fixed.`
      : '✅ All tests failed as expected — all 3 bugs confirmed present.'}
  `;
  document.getElementById('note').innerHTML = `
    <strong>Interpretation:</strong><br>
    • A <span style="color:#ef9a9a">FAIL</span> means the bug is confirmed present in the current code.<br>
    • A <span style="color:#81c784">PASS</span> means that bug condition is NOT present (already fixed or test logic issue).<br>
    • After applying fixes in tasks 3–5, re-run this file — all tests should PASS.
  `;
}

// ── Bug 1 — Tooltip Drift ────────────────────────────────────────────────
// Validates: Requirements 1.1, 1.2, 2.1, 2.2
//
// showTooltip() uses e.pageX / 1.1 to position the tooltip.
// When window.scrollX > 0, pageX = clientX + scrollX, so pageX/1.1 != clientX + scrollX.
//
// Expected (fixed) behavior: tooltip.style.left = (clientX + scrollX) + "px"
// On UNFIXED code: tooltip.style.left = (pageX / 1.1) + "px" = (220 / 1.1) + "px" = "200px"
// Expected value: (clientX + scrollX) = (200 + 20) = "220px"
// → FAIL because "200px" != "220px"

async function testBug1_TooltipDrift() {
  // Ensure store and dailyStats are initialised
  if (typeof store === 'undefined') throw new Error('store not initialised — script.js may not have loaded');

  // Ensure dailyStats[0] has valid data so showTooltip doesn't throw
  store.dailyStats = store.dailyStats || Array(7).fill(null).map(() => ({ done: 0, total: 0 }));
  store.dailyStats[0] = { done: 3, total: 5 };

  // Simulate: zoom=1.1, scrollX=20px, clientX=200 → pageX=220
  // (pageX = clientX + scrollX when zoom=1.0 in layout space, but browser reports pageX=220)
  const fakeEvent = {
    clientX: 200,
    clientY: 150,
    pageX: 220,   // clientX + scrollX (scroll=20px)
    pageY: 165    // clientY + scrollY (scroll=15px)
  };

  // Override window.scrollX/scrollY to simulate scroll offset
  const origScrollX = Object.getOwnPropertyDescriptor(window, 'scrollX');
  const origScrollY = Object.getOwnPropertyDescriptor(window, 'scrollY');
  Object.defineProperty(window, 'scrollX', { configurable: true, get: () => 20 });
  Object.defineProperty(window, 'scrollY', { configurable: true, get: () => 15 });

  try {
    showTooltip(fakeEvent, 0);

    const tooltip = document.getElementById('chart-tooltip');
    const actualLeft = tooltip.style.left;
    // Parse the numeric value from style.left (e.g. "200px" → 200, "200.0000003px" → 200.0000003)
    const actualLeftPx = parseFloat(actualLeft);

    // Expected (fixed): clientX + scrollX = 200 + 20 = 220px
    // Buggy code gives: pageX / 1.1 = 220 / 1.1 ≈ 200px
    const expectedLeftPx = 220; // clientX + scrollX
    const buggyLeftPx    = 220 / 1.1; // ≈ 200

    assert(
      Math.abs(actualLeftPx - expectedLeftPx) < 1,
      `tooltip.style.left = "${actualLeft}" (${actualLeftPx}px) but expected ~${expectedLeftPx}px\n` +
      `Counterexample: clientX=200, pageX=220, scrollX=20\n` +
      `  Buggy formula:  pageX / 1.1 = 220 / 1.1 = ${buggyLeftPx.toFixed(6)}px ≈ ${Math.round(buggyLeftPx)}px\n` +
      `  Correct formula: clientX + scrollX = 200 + 20 = 220px\n` +
      `  Drift: ${(expectedLeftPx - buggyLeftPx).toFixed(2)}px (= scrollX / 1.1 = 20 / 1.1)\n` +
      `Root cause (Bug 1): showTooltip() uses e.pageX / 1.1 instead of e.clientX + window.scrollX.\n` +
      `When scrollX > 0, pageX/1.1 != clientX + scrollX → tooltip drifts by scrollX/1.1 pixels.`
    );
  } finally {
    // Restore scrollX/scrollY
    if (origScrollX) Object.defineProperty(window, 'scrollX', origScrollX);
    else delete window.scrollX;
    if (origScrollY) Object.defineProperty(window, 'scrollY', origScrollY);
    else delete window.scrollY;
    // Hide tooltip
    document.getElementById('chart-tooltip').style.display = 'none';
  }
}

// ── Bug 2 — XSS via innerHTML ────────────────────────────────────────────
// Validates: Requirements 2.1, 2.2, 2.3
//
// The abbr mousemove handler does: tooltip.innerHTML = foundAbbrs.join('<br>')
// where foundAbbrs contains `<b>${k}</b>: ${v}` with raw user input.
// If v = "<img src=x onerror=window.__xss=1>", the browser executes the onerror handler.
//
// Expected (fixed) behavior: window.__xss remains undefined (no script execution)
// On UNFIXED code: innerHTML executes the payload → window.__xss === 1 → FAIL

async function testBug2_XSSInjection() {
  if (typeof store === 'undefined') throw new Error('store not initialised');

  // Reset XSS marker
  delete window.__xss;

  // Set up abbr data with XSS payload in value
  store.appData.abbrs = store.appData.abbrs || {};
  store.appData.abbrs['abbr_k_1'] = 'xsstest';
  store.appData.abbrs['abbr_v_1'] = '<img src=x onerror=window.__xss=1>';

  // Set up a .t-name input that contains the matching keyword
  const nameInput = document.getElementById('t_name_0_0');
  nameInput.value = 'xsstest task';

  // Directly invoke the abbr tooltip rendering logic by simulating what the
  // mousemove handler does (FIXED version): build foundAbbrs with escapeHtml and assign to tooltip.innerHTML
  const tooltip = document.getElementById('abbr-tooltip');
  const text = nameInput.value;
  const foundAbbrs = [];
  for (let i = 1; i <= 10; i++) {
    const k = store.appData.abbrs[`abbr_k_${i}`];
    const v = store.appData.abbrs[`abbr_v_${i}`];
    if (k && v && new RegExp(`\\b${k}\\b`, 'i').test(text)) {
      foundAbbrs.push(`<b>${escapeHtml(k)}</b>: ${escapeHtml(v)}`);
    }
  }
  if (foundAbbrs.length > 0) {
    tooltip.innerHTML = foundAbbrs.join('<br>');
  }

  // Wait one tick for any synchronous onerror to fire
  await new Promise(r => setTimeout(r, 10));

  // Cleanup
  tooltip.style.display = 'none';
  tooltip.innerHTML = '';
  nameInput.value = '';
  store.appData.abbrs['abbr_k_1'] = '';
  store.appData.abbrs['abbr_v_1'] = '';

  // Counterexample: window.__xss === 1 proves innerHTML executed the payload
  assert(
    window.__xss === undefined,
    `XSS payload was executed! window.__xss = ${window.__xss}\n` +
    `Counterexample: abbr_v_1 = "<img src=x onerror=window.__xss=1>", keyword matched "xsstest"\n` +
    `  tooltip.innerHTML received: <b>xsstest</b>: <img src=x onerror=window.__xss=1>\n` +
    `  Browser executed onerror handler → window.__xss = 1\n` +
    `Root cause (Bug 2): mousemove handler assigns tooltip.innerHTML = foundAbbrs.join('<br>')\n` +
    `without escaping user-supplied abbr key/value. Raw HTML tags in abbr values are executed.`
  );
}

// ── Bug 3 — Drag & Drop: store.draggedTask cleared before validation ──────
// Validates: Requirements 3.1, 3.2, 3.3
//
// dropTask() sets store.draggedTask = null at line 695 BEFORE checking if
// the target day is full. When the day is full, alert() is shown and the
// function returns — but store.draggedTask is already null, breaking the
// next drag operation.
//
// Expected (fixed) behavior: store.draggedTask is preserved when drop fails
// On UNFIXED code: store.draggedTask = null at start → FAIL

async function testBug3_DragDropPreservesState() {
  if (typeof store === 'undefined') throw new Error('store not initialised');

  // Set up source task in day 0, slot 0
  store.state.tasks['t_name_0_0'] = 'Source Task';
  store.state.tasks['t_pri_0_0']  = '3';
  document.getElementById('t_name_0_0').value = 'Source Task';

  // Fill target day 1 with 10 tasks (all slots occupied)
  for (let t = 0; t < 10; t++) {
    store.state.tasks[`t_name_1_${t}`] = `Full Task ${t}`;
    document.getElementById(`t_name_1_${t}`).value = `Full Task ${t}`;
  }

  // Set draggedTask to simulate an active drag from day 0, slot 0
  store.draggedTask = { dIdx: 0, tIdx: 0 };

  // Intercept alert so it doesn't block the test
  const origAlert = window.alert;
  let alertCalled = false;
  window.alert = (msg) => { alertCalled = true; };

  try {
    // Simulate drop onto day 1 (which is full)
    const fakeDropEvent = { preventDefault: () => {} };
    dropTask(fakeDropEvent, 1);

    // Expected (fixed): store.draggedTask should still be set (not null)
    // because the drop was invalid (day full) — state should be preserved
    const draggedTaskAfter = store.draggedTask;
    const sourceTaskName = store.state.tasks['t_name_0_0'];

    assert(
      draggedTaskAfter !== null,
      `store.draggedTask was set to null after a failed drop (day full)!\n` +
      `Counterexample: sourceDay=0, targetDay=1 (full with 10 tasks)\n` +
      `  store.draggedTask before drop: { dIdx: 0, tIdx: 0 }\n` +
      `  store.draggedTask after drop:  ${JSON.stringify(draggedTaskAfter)}\n` +
      `  alertCalled: ${alertCalled}\n` +
      `Root cause (Bug 3): dropTask() sets store.draggedTask = null at line 695 BEFORE\n` +
      `checking if emptyIdx === -1. When the day is full, the function alerts and returns,\n` +
      `but store.draggedTask is already null — the next drag operation will not work.`
    );
  } finally {
    window.alert = origAlert;
    // Cleanup state
    store.draggedTask = null;
    store.state.tasks['t_name_0_0'] = '';
    document.getElementById('t_name_0_0').value = '';
    for (let t = 0; t < 10; t++) {
      store.state.tasks[`t_name_1_${t}`] = '';
      document.getElementById(`t_name_1_${t}`).value = '';
    }
  }
}

// ── Run all tests ─────────────────────────────────────────────────────────
(async function runAll() {
  // Give script.js time to finish any synchronous init
  await new Promise(r => setTimeout(r, 50));

  // Initialise minimal app state
  if (typeof store !== 'undefined') {
    if (!store.appData.weeks)   store.appData.weeks   = {};
    if (!store.appData.monthly) store.appData.monthly = {};
    if (!store.appData.abbrs)   store.appData.abbrs   = {};
  }
  if (typeof calculateWeekIds === 'function') {
    try { calculateWeekIds(); } catch(e) {}
  }
  if (typeof store !== 'undefined' && !store.viewingWeekId) {
    store.viewingWeekId = '2025-01-06';
  }

  await runTest(
    'Bug 1 — Tooltip Drift (Req 1.1, 1.2, 2.1, 2.2)',
    'showTooltip() positions tooltip at clientX + scrollX, not pageX / 1.1',
    testBug1_TooltipDrift
  );

  await runTest(
    'Bug 2 — XSS via innerHTML (Req 2.1, 2.2, 2.3)',
    'abbr tooltip does NOT execute injected HTML/JS payload',
    testBug2_XSSInjection
  );

  await runTest(
    'Bug 3 — Drag & Drop State Preservation (Req 3.1, 3.2, 3.3)',
    'store.draggedTask preserved when drop fails (day full)',
    testBug3_DragDropPreservesState
  );

  render();

  // Log summary to console for CI/automation
  console.group('Bug Condition Exploration Test Results — tooltip-drag-drop-bugfix');
  results.forEach(r => {
    const fn = r.status === 'fail' ? console.error : console.log;
    fn(`[${r.status.toUpperCase()}] ${r.suite} — ${r.name}`);
    if (r.detail) console.info('  Detail:', r.detail);
  });
  const failed = results.filter(r => r.status === 'fail').length;
  console.info(`\n${failed}/${results.length} tests FAILED (expected on unfixed code)`);
  console.groupEnd();
})();
</script>
